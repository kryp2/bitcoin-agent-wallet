name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install libsecret
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: npm ci
      - run: npm run build
      - run: npm test
